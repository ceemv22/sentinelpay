name: Daily Mixer Database Update

on:
  schedule:
    - cron: '0 0 * * *' # Every day at 00:00 UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-mixers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run mixer updater
        run: python scripts/update_mixers.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/mixers.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: daily mixer database update" && git push origin dev)
