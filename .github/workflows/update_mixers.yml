name: Daily Mixer Database Update

on:
  schedule:
    - cron: '0 0 * * *' # Every day at 00:00 UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-mixers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run mixer updater
        run: python scripts/update_mixers.py

      - name: Detect changes
        id: detect_changes
        run: |
          if git diff --quiet -- data/mixers.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload reviewed mixer snapshot
        if: steps.detect_changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: reviewed-mixers-json
          path: data/mixers.json

      - name: Require manual review for dataset changes
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          echo "Mixer dataset changed. Review the artifact and merge manually."
          exit 1
