openapi: 3.0.0
info:
  title: sentinelpay risk scoring API
  description: |
    ## real-time pre-deposit wallet risk evaluation
    **S-TIER SECURITY CERTIFIED (Audit 2026-04-21)**

    sentinelpay is a lightweight risk decision layer for crypto payment flows.
    it scores wallet addresses before funds are accepted, helping platforms reject
    deposits from malicious actors, mixer funds, and sanctioned addresses.

    ### phase 3.0 capabilities
    - heuristics-based scoring across ETH, internal, and ERC-20 token transfers
    - four core risk signals with descending-priority risk analysis
    - authenticated B2B API (API Keys) + User API (Supabase Bearer JWT)
    - designed for high-risk verticals (crypto casinos, OTC desks)

    ### rate limits
    - **B2B API**: 30 requests per 15 minutes per IP (authenticated via x-api-key)
    - **Public API**: Strictly rate-limited via Dual-Layer Fingerprinting (3 free scans)
    - **User API**: Credit-based (decrementing on verify)

    ### authentication
    - **B2B**: Requires `x-api-key` header (SHA-256 hashed).
    - **User**: Requires `Authorization: Bearer <jwt-token>` (Supabase Auth).
    - **Public**: No authentication (Traffic-limited).

  version: 3.0.0
  contact:
    name: sentinelpay
    url: https://sentinelpay.org
    email: ceem@sentinelpay.org

tags:
  - name: scoring
    description: endpoints for real-time wallet risk assessment.
  - name: profile
    description: user credit and scan history management.

servers:
  - url: https://sentinelpay.org/v1
    description: production

paths:
  /score:
    post:
      summary: [B2B] score a wallet address (API Key)
      description: requires valid x-api-key.
      security:
        - ApiKeyAuth: []
      tags:
        - scoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScoreRequest'
      responses:
        '200':
          description: successful scoring
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoreResponse'
        '401':
          description: unauthorized

  /user/score:
    post:
      summary: [User] score a wallet address (Bearer JWT)
      description: consumes 1 credit. requires Bearer token.
      security:
        - BearerAuth: []
      tags:
        - scoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScoreRequest'
      responses:
        '200':
          description: successful scoring
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoreResponse'

  /user/profile:
    get:
      summary: get user profile and scan history
      security:
        - BearerAuth: []
      tags:
        - profile
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  email: { type: string }
                  credits: { type: integer }
                  history: { type: array, items: { $ref: '#/components/schemas/ScoreResponse' } }

  /public/score:
    post:
      summary: [Public] free risk scan
      description: no auth required. strictly rate limited.
      tags:
        - scoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScoreRequest'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoreResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ScoreRequest:
      type: object
      required: [wallet]
      properties:
        wallet:
          type: string
          pattern: '^0x[a-fA-F0-9]{40}$'
          example: "0x742d35Cc6634C0532925a3b844Bc9e695d487DA2"

    ScoreResponse:
      type: object
      properties:
        wallet: { type: string }
        score: { type: integer }
        category: { type: string, enum: [low, medium, high] }
        flags: { type: array, items: { type: string } }
        timestamp: { type: string, format: date-time }