<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sentinelpay | view invitation</title>
    <meta name="theme-color" content="#040404">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=21.4">
    <script src="lib/supabase.js"></script>
</head>
<body style="overflow: hidden; font-family: 'JetBrains Mono', monospace; text-transform: lowercase;">
    <div class="cyber-grid"></div>
    <div class="glow-orb"></div>

    <div class="auth-page-wrap">
        <!-- Center Logo with Eye Tracking -->
        <div class="auth-center-logo" style="margin-bottom: 25px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="width: 80px; height: 80px;">
              <defs>
                <linearGradient id="neonGradientJoin" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#00ffff" />
                  <stop offset="100%" stop-color="#a020f0" />
                </linearGradient>
                <filter id="neonGlowJoin" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
                  <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>
              <g filter="url(#neonGlowJoin)" fill="none" stroke="url(#neonGradientJoin)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M60 15 L25 30 V55 C25 80 50 100 60 105 C70 100 95 80 95 55 V30 Z" />
                <path d="M38 60 Q 60 40 82 60 Q 60 80 38 60 Z" />
                <g id="eye-center-join">
                  <circle cx="60" cy="60" r="6" />
                  <circle cx="60" cy="60" r="2" fill="url(#neonGradientJoin)" stroke="none"/>
                </g>
              </g>
            </svg>
        </div>

        <!-- View Invitation Card -->
        <div class="auth-card" id="join-card" style="position: relative; z-index: 500; max-width: 420px; text-align: center; padding: 3.5rem 2.5rem; border: 1px solid rgba(0, 240, 255, 0.15); box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 30px rgba(0, 240, 255, 0.05);">
            <h1 class="success-title-new" style="font-size: 1.6rem !important; margin-bottom: 1rem; letter-spacing: -1px;">view invitation</h1>
            <p id="join-subtitle" class="success-subtitle-new" style="margin-bottom: 2.5rem; font-size: 0.8rem; color: var(--text-muted); line-height: 1.6;">sign in or create an account to view this invitation</p>

            <div id="auth-buttons-group" style="display: flex; flex-direction: column; gap: 0.75rem; width: 100%;">
                <button id="btn-join-login" class="submit-btn" style="margin-top: 0; height: 50px; font-weight: 700; font-size: 0.8rem; letter-spacing: 1px;">sign in</button>
                <button id="btn-join-register" class="submit-btn" style="margin-top: 0; height: 50px; background: rgba(255,255,255,0.03); color: #fff; border: 1px solid rgba(255,255,255,0.1); font-weight: 700; font-size: 0.8rem; letter-spacing: 1px;">create account</button>
            </div>
            
            <!-- Accept Section -->
            <div id="accept-section" style="display: none; flex-direction: column; width: 100%;">
                <div style="background: rgba(0, 240, 255, 0.03); border: 1px solid rgba(0, 240, 255, 0.1); border-radius: 12px; padding: 1.25rem; margin-bottom: 2rem;">
                    <p style="color: var(--text-muted); font-size: 0.75rem; line-height: 1.8; margin: 0;">
                        <span id="inviter-name" style="color: #fff; font-weight: 700;">...</span> invited you to join organization <span id="org-slug-name" style="color: var(--neon-blue); font-weight: 700;">...</span>
                    </p>
                </div>
                <button id="btn-accept-invite" class="submit-btn" style="margin-top: 0; height: 55px; font-weight: 800; letter-spacing: 1.5px;">accept handshake</button>
            </div>
        </div>
    </div>

    <script src="toast.js"></script>
    <script>
        // Eye Tracking Logic for Join Page
        document.addEventListener('mousemove', (e) => {
            const eyeCenter = document.getElementById('eye-center-join');
            if (!eyeCenter) return;
            const rect = eyeCenter.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
            const distance = Math.min(3, Math.hypot(e.clientX - centerX, e.clientY - centerY) / 60);
            const moveX = Math.cos(angle) * distance;
            const moveY = Math.sin(angle) * distance;
            eyeCenter.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
    <script src="join.js"></script>
</body>
</html>
