<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sentinelpay | view invitation</title>
    <meta name="theme-color" content="#040404">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=21.4">
    <script src="lib/supabase.js"></script>
</head>
<body style="overflow: hidden;">
    <div class="cyber-grid"></div>
    <div class="glow-orb"></div>

    <div class="auth-page-wrap">
        <!-- Center Logo -->
        <div class="auth-center-logo" style="margin-bottom: 20px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="width: 70px; height: 70px;">
              <defs>
                <linearGradient id="neonGradientJoin" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#00ffff" />
                  <stop offset="100%" stop-color="#a020f0" />
                </linearGradient>
                <filter id="neonGlowJoin" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
                  <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>
              <g filter="url(#neonGlowJoin)" fill="none" stroke="url(#neonGradientJoin)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M60 15 L25 30 V55 C25 80 50 100 60 105 C70 100 95 80 95 55 V30 Z" />
                <path d="M38 60 Q 60 40 82 60 Q 60 80 38 60 Z" />
                <g class="eye-pupil">
                  <circle cx="60" cy="60" r="6" />
                  <circle cx="60" cy="60" r="2" fill="url(#neonGradientJoin)" stroke="none"/>
                </g>
              </g>
            </svg>
        </div>

        <!-- View Invitation Card -->
        <div class="auth-card" id="join-card" style="position: relative; z-index: 500; max-width: 400px; text-align: center; padding: 3rem 2.5rem;">
            <h1 class="success-title-new" style="font-size: 1.8rem !important; margin-bottom: 0.75rem;">view invitation</h1>
            <p id="join-subtitle" class="success-subtitle-new" style="margin-bottom: 2.5rem;">sign in or create an account to view this invitation</p>

            <div style="display: flex; flex-direction: column; gap: 1rem; width: 100%;">
                <button id="btn-join-login" class="submit-btn" style="margin-top: 0;">sign in</button>
                <button id="btn-join-register" class="submit-btn" style="margin-top: 0; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.15);">create an account</button>
            </div>
            
            <!-- Information for Logged In users will be injected here via JS -->
            <div id="accept-section" style="display: none; flex-direction: column; width: 100%; margin-top: 1rem;">
                <div style="background: rgba(0, 240, 255, 0.05); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem;">
                    <p style="color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; line-height: 1.6; margin: 0;">
                        <strong id="inviter-name" style="color: #fff;">someone</strong> invited you to join organization <strong id="org-slug-name" style="color: var(--neon-blue);">...</strong>
                    </p>
                </div>
                <button id="btn-accept-invite" class="submit-btn" style="margin-top: 0;">accept and join team</button>
            </div>
        </div>
    </div>

    <script src="toast.js"></script>
    <script src="join.js"></script>
</body>
</html>
