<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sentinelpay | view invitation</title>
    <meta name="theme-color" content="#040404">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=21.4">
    <script src="lib/supabase.js"></script>
    <style>
        #sp-loader{position:fixed;inset:0;z-index:99999;background:#050505;display:flex;align-items:center;justify-content:center;transition:opacity 0.55s ease;}
        #sp-loader.spl-done{opacity:0;pointer-events:none;}
        .spl-logo-svg{width:130px;height:130px;animation:splPulse 2.5s ease-in-out infinite alternate;}
        @keyframes splPulse{from{filter:drop-shadow(0 0 6px rgba(0,255,255,0.3)) drop-shadow(0 0 14px rgba(160,32,240,0.2));}to{filter:drop-shadow(0 0 14px rgba(0,255,255,0.65)) drop-shadow(0 0 28px rgba(160,32,240,0.4));}}
        .spl-eye-blink{transform-origin:60px 60px;animation:splBlink 3.5s ease-in-out infinite;}
        @keyframes splBlink{0%,35%,55%,88%,100%{transform:scaleY(1);}45%{transform:scaleY(0.05);}93%{transform:scaleY(0.05);}}
    </style>
</head>
<body style="overflow: hidden;">
    <noscript>
        <div class="noscript-overlay">
            <div class="cyber-grid"></div>
            <div class="noscript-card glass-panel">
                <div class="noscript-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--color-red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto;">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12" y2="17"/>
                    </svg>
                </div>
                <h1 class="noscript-title">javascript_required</h1>
                <p class="noscript-text">sentinelpay requires javascript to initialize secure sessions.</p>
                <div class="noscript-status">> status: blocked_</div>
            </div>
        </div>
    </noscript>
    <div id="sp-loader"><svg class="spl-logo-svg" viewBox="0 0 120 120" fill="none"><defs><linearGradient id="spl-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00ffff"/><stop offset="100%" stop-color="#a020f0"/></linearGradient><filter id="spl-glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><g filter="url(#spl-glow)" fill="none" stroke="url(#spl-grad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M60 15 L25 30 V55 C25 80 50 100 60 105 C70 100 95 80 95 55 V30 Z"/><g class="spl-eye-blink"><path d="M38 60 Q 60 40 82 60 Q 60 80 38 60 Z"/><circle cx="60" cy="60" r="6"/><circle cx="60" cy="60" r="2" fill="url(#spl-grad)" stroke="none"/></g><path d="M60 15 V 30" stroke-width="2" opacity="0.6"/><path d="M60 90 V 105" stroke-width="2" opacity="0.6"/></g></svg></div>
    <script>window.addEventListener('load',function(){var l=document.getElementById('sp-loader');if(!l)return;l.classList.add('spl-done');setTimeout(function(){l.remove();},600);});</script>
    <div class="cyber-grid"></div>
    <div class="glow-orb"></div>

    <div class="auth-page-wrap">

        <div class="auth-center-logo desktop-only">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="width: 80px; height: 80px; margin-bottom: -10px;">
              <defs>
                <linearGradient id="neonGradientJoin" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#00ffff" />
                  <stop offset="100%" stop-color="#a020f0" />
                </linearGradient>
                <filter id="neonGlowJoin" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
                  <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>
              <g filter="url(#neonGlowJoin)" fill="none" stroke="url(#neonGradientJoin)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M60 15 L25 30 V55 C25 80 50 100 60 105 C70 100 95 80 95 55 V30 Z" />
                <path d="M38 60 Q 60 40 82 60 Q 60 80 38 60 Z" />
                <g id="eye-center-join" style="transition: transform 0.1s ease-out;">
                  <circle cx="60" cy="60" r="6" />
                  <circle cx="60" cy="60" r="2" fill="url(#neonGradientJoin)" stroke="none"/>
                </g>
                <path d="M60 15 V 30" stroke-width="2" opacity="0.6"/>
                <path d="M60 90 V 105" stroke-width="2" opacity="0.6"/>
              </g>
            </svg>
        </div>

        <div id="join-card" class="auth-card" style="display: none; position: relative; z-index: 500;">

            <div id="join-top-section" style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%;">
                <div style="margin-bottom: 2rem; filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.25));">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="width: 100px; height: 100px;">
                        <defs>
                            <linearGradient id="joinIconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#00f0ff" />
                                <stop offset="100%" stop-color="#a020f0" />
                            </linearGradient>
                        </defs>
                        <g fill="none" stroke="url(#joinIconGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M60 15 L25 30 V55 C25 80 50 100 60 105 C70 100 95 80 95 55 V30 Z" style="opacity: 0.25;" />
                            <path class="animated-check-path" d="M45 60 L55 70 L75 50" stroke-width="4"></path>
                        </g>
                    </svg>
                </div>

                <h2 style="font-size: 2.25rem; font-weight: 800; letter-spacing: -1.75px; color: #fff; margin-bottom: 1rem; font-family: 'JetBrains Mono', monospace; text-transform: lowercase; text-align: center;">view invitation</h2>
                <p id="join-subtitle" style="color: rgba(255,255,255,0.4); font-size: 0.9rem; font-family: 'JetBrains Mono', monospace; line-height: 1.8; max-width: 280px; margin: 0 auto; text-align: center;">sign in or create an account to view this invitation</p>

                <div id="accept-info-box" style="display: none; margin-top: 2rem; width: 100%;">
                    <p style="color: rgba(255,255,255,0.4); font-size: 0.85rem; font-family: 'JetBrains Mono', monospace; line-height: 1.8; text-align: center;">
                        <span id="inviter-name" style="color: #fff; font-weight: 700;"></span> invited you to join<br>
                        <span id="org-slug-name" style="color: var(--neon-blue); font-weight: 700;"></span>
                    </p>
                </div>
            </div>

            <div id="auth-buttons-group" style="min-height: 120px; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; width: 100%; gap: 0.75rem; padding-bottom: 0.5rem;">
                <button id="btn-join-login" class="submit-btn" style="margin-top: 0;">sign in</button>
                <button id="btn-join-register" class="submit-btn" style="margin-top: 0; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.12);">create account</button>
            </div>

            <div id="accept-section" style="display: none; min-height: 120px; flex-direction: column; justify-content: flex-end; align-items: center; width: 100%; padding-bottom: 0.5rem;">
                <button id="btn-accept-invite" class="submit-btn" style="margin-top: 0;">accept handshake</button>
            </div>

        </div>

        <div id="wrong-account-state" class="auth-card" style="display: none; position: relative; z-index: 500;">
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%;">
                <div style="margin-bottom: 2rem; filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.25));">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="width: 100px; height: 100px;">
                        <defs>
                            <linearGradient id="joinIconGradWarn" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#00f0ff" />
                                <stop offset="100%" stop-color="#a020f0" />
                            </linearGradient>
                        </defs>
                        <g fill="none" stroke="url(#joinIconGradWarn)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M60 15 L25 30 V55 C25 80 50 100 60 105 C70 100 95 80 95 55 V30 Z" style="opacity: 0.25;" />
                            <path class="animated-x-path" d="M48 48 L72 72" stroke-width="4" />
                            <path class="animated-x-path" d="M72 48 L48 72" stroke-width="4" style="animation-delay: 0.15s;" />
                        </g>
                    </svg>
                </div>
                <h2 style="font-size: 2.25rem; font-weight: 800; letter-spacing: -1.75px; color: #fff; margin-bottom: 1.5rem; font-family: 'JetBrains Mono', monospace; text-transform: lowercase; text-align: center;">wrong account</h2>
                
                <div style="background: rgba(255, 165, 0, 0.05); border: 1px solid rgba(255, 165, 0, 0.2); border-radius: 12px; padding: 1.25rem; width: 100%; text-align: left; display: flex; gap: 1rem; align-items: flex-start;">
                    <div style="flex-shrink: 0; margin-top: 2px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffcc00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                            <line x1="12" y1="9" x2="12" y2="13"/>
                            <line x1="12" y1="17" x2="12" y2="17"/>
                        </svg>
                    </div>
                    <p style="color: rgba(255,255,255,0.7); font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; line-height: 1.6; margin: 0;">
                        you are signed in as <span id="wrong-account-email" style="color: #fff; font-weight: 700;">...</span>.<br>
                        sign in with the email address that received this invite.
                    </p>
                </div>
            </div>

            <div style="min-height: 120px; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; width: 100%; padding-bottom: 0.5rem;">
                <button id="btn-wrong-account-logout" class="submit-btn" style="margin-top: 0; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.12);">sign out</button>
            </div>
        </div>
    </div>

    <script src="toast.js"></script>
    <script>
        // Eye tracking — same as auth.html / dashboard.html
        document.addEventListener('mousemove', (e) => {
            const eyeCenter = document.getElementById('eye-center-join');
            if (!eyeCenter) return;
            const rect = eyeCenter.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
            const distance = Math.min(4, Math.hypot(e.clientX - centerX, e.clientY - centerY) / 50);
            const moveX = Math.cos(angle) * distance;
            const moveY = Math.sin(angle) * distance;
            eyeCenter.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
    <script src="join.js"></script>
</body>
</html>
