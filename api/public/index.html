<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sentinelpay | pre-deposit risk tool</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="glow-orb"></div>
    
    <main class="container">
        <header>
            <div class="top-nav">
                <a href="https://github.com/ceemv22/sentinelpay" target="_blank" class="github-link">github_repo</a>
            </div>
            <div class="logo">sentinelpay</div>
            <p class="subtitle">> initialize risk scan sequence_</p>
        </header>

        <section class="scanner-card glass-panel">
            <div class="input-group">
                <input type="text" id="wallet-input" placeholder="0x..." autocomplete="off" spellcheck="false" maxlength="42">
                <button id="scan-btn">scan wallet</button>
            </div>
            <div class="status-message" id="status-message"></div>
        </section>

        <section class="result-card glass-panel hidden" id="result-card">
            <div class="traffic-lights">
                <div class="light" id="light-high"></div>
                <div class="light" id="light-medium"></div>
                <div class="light" id="light-low"></div>
            </div>
            
            <div class="score-display">
                <h1 class="score-h1" id="score-value">00</h1>
                <div class="flags" id="flags-container"></div>
                <button id="share-btn" class="hidden outline-btn">share result to x</button>
            </div>
        </section>

        <footer class="cyber-footer">
            <p>// one api call. zero latency. complete risk visibility.</p>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
