<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sentinelpay | pre-deposit risk tool</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="style.css?v=3.0">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="glow-orb"></div>
    
    <main class="container">
        <header>
            <div class="top-nav">
                <a href="https://github.com/ceemv22/sentinelpay" target="_blank" class="github-link">
                    <svg height="16" viewBox="0 0 16 16" width="16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
                    <span>view_source</span>
                </a>
                <div id="auth-nav-container" style="display: flex; gap: 0.5rem; align-items: center;">
                    <a href="/auth" id="nav-login-btn" class="auth-nav-btn" style="background: transparent; border-color: rgba(255,255,255,0.05); color: var(--text-muted);">login</a>
                    <a href="/auth?tab=register" id="nav-register-btn" class="auth-nav-btn">register</a>
                </div>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="width: 80px; height: 80px; margin-bottom: -15px;">
              <defs>
                <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#00ffff" />
                  <stop offset="100%" stop-color="#a020f0" />
                </linearGradient>
                <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
                  <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>
              <g filter="url(#neonGlow)" fill="none" stroke="url(#neonGradient)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M60 15 L25 30 V55 C25 80 50 100 60 105 C70 100 95 80 95 55 V30 Z" />
                <path d="M38 60 Q 60 40 82 60 Q 60 80 38 60 Z" />
                <g id="eye-pupil" style="transition: transform 0.1s ease-out;">
                  <circle cx="60" cy="60" r="6" />
                  <circle cx="60" cy="60" r="2" fill="url(#neonGradient)" stroke="none"/>
                </g>
                <path d="M60 15 V 30" stroke-width="2" opacity="0.6"/>
                <path d="M60 90 V 105" stroke-width="2" opacity="0.6"/>
              </g>
            </svg>
            <div class="logo">sentinelpay</div>
            <p class="subtitle">> initialize risk scan sequence_</p>
        </header>

        <section class="scanner-card glass-panel">
            <div class="input-group">
                <input type="text" id="wallet-input" placeholder="0x..." autocomplete="off" spellcheck="false" maxlength="42">
                <button id="scan-btn">scan wallet</button>
            </div>
            <div class="status-message" id="status-message"></div>
        </section>

        <section class="result-card glass-panel hidden" id="result-card">
            <div class="traffic-lights">
                <div class="light" id="light-high"></div>
                <div class="light" id="light-medium"></div>
                <div class="light" id="light-low"></div>
            </div>
            
            <div class="score-display">
                <h1 class="score-h1" id="score-value">00</h1>
                <div class="flags" id="flags-container"></div>
                <button id="share-btn" class="hidden outline-btn">share result to x</button>
            </div>
        </section>

        <footer class="cyber-footer">
            <p>// one api call. zero latency. complete risk visibility.</p>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
