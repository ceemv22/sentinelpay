<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>confirm your email | sentinelpay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;">
    <div style="background-color: #050505; padding: 100px 20px; text-align: center;">

        <table align="center" border="0" cellpadding="0" cellspacing="0" style="margin-bottom: 50px;">
            <tr>
                <td align="center">
                    <img src="https://sentinelpay.org/logo.png" alt="sentinelpay" width="64" height="64" style="display: block; border: 0;">
                </td>
            </tr>
        </table>

        <table align="center" border="0" cellpadding="0" cellspacing="0" style="max-width: 420px; width: 100%; border-top: 1px solid rgba(255,255,255,0.05);">
            <tr>
                <td style="padding: 40px 0;">
                    <h1 style="font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -1.5px; margin: 0 0 25px 0; color: #ffffff; text-transform: lowercase;">confirm your email.</h1>

                    <p style="font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.6; color: #777777; margin: 0 0 45px 0; text-transform: lowercase;">
                        Confirm this address to link it to your sentinelpay account and enable two-factor authentication.
                    </p>

                    <div style="margin-bottom: 45px;">
                        <a href="{{ .ConfirmationURL }}" style="background-color: #ffffff; color: #000000; padding: 20px 40px; text-decoration: none; font-weight: 800; font-size: 13px; font-family: 'Inter', sans-serif; text-transform: lowercase; display: inline-block; box-shadow: 0 8px 24px rgba(0, 240, 255, 0.15);">
                            confirm email
                        </a>
                    </div>
                </td>
            </tr>
        </table>

        <div style="max-width: 420px; margin: 0 auto; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.03); text-align: left;">
            <div style="font-size: 11px; font-family: 'Inter', sans-serif; color: #555555; text-transform: lowercase; line-height: 1.7;">
                if you didn't request this, you can ignore this email.
            </div>
        </div>
    </div>
</body>
</html>
