<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sentinelpay | dashboard</title>
    
    <meta name="theme-color" content="#050505">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=21.3">
    <script src="lib/supabase.js"></script>
    <style>
        :root {
            --sidebar-width: 280px;
            --accent-glow: rgba(0, 240, 255, 0.15);
        }

        body {
            display: flex;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
            min-height: 100vh;
        }

        .dashboard-header {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .api-key-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(10, 12, 15, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            padding: 8px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .api-key-badge:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .api-key-badge .key-prefix { color: var(--neon-blue); }
        .api-key-badge .key-dots { opacity: 0.5; letter-spacing: 1px; }
        .api-key-badge .key-suffix { color: #fff; font-weight: 700; }
        
        .copy-icon {
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .api-key-badge:hover .copy-icon {
            opacity: 1;
            color: var(--neon-blue);
        }

        /* --- API Key Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: rgba(10, 12, 15, 0.85);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            position: relative;
            transform: translateY(20px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0;
        }

        .modal-close:hover {
            color: #fff;
            transform: none;
            box-shadow: none;
        }

        .modal-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .modal-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .api-key-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .api-key-wrapper {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            overflow-x: auto;
        }

        #modal-api-key-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-muted);
            word-break: break-all;
        }

        .api-actions {
            display: flex;
            gap: 1rem;
        }

        .api-actions button {
            flex: 1;
            padding: 0.8rem;
            font-size: 0.8rem;
        }

        .user-menu-trigger {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 4px 12px 4px 4px;
            border-radius: 50px;
            transition: all 0.3s ease;
            background: transparent;
            border: 1px solid transparent;
        }

        .user-menu-trigger:hover {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .user-menu-trigger:hover .user-avatar {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
        }

        .user-menu-container {
            position: relative;
        }

        .chevron-icon {
            color: var(--text-muted);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.6;
        }

        .user-menu-trigger:hover .chevron-icon {
            color: #fff;
            opacity: 1;
            transform: translateY(2px);
        }
        
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 15px);
            right: 0;
            width: 240px;
            background: rgba(10, 12, 15, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10001;
        }

        .dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-header {
            padding: 4px 8px 12px 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--neon-blue);
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border-glass);
            margin: 8px 0 12px 0;
            width: calc(100% + 24px);
            transform: translateX(-12px);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            text-transform: lowercase;
            font-weight: 500;
            border-radius: 8px;
            margin-bottom: 4px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        
        .dropdown-item:last-child {
            margin-bottom: 0;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--neon-blue);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.05);
            transform: translateY(-1px);
        }

        .dropdown-item svg {
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }
        
        .dropdown-item:hover svg {
            color: var(--neon-blue);
        }

        .dropdown-item.text-red {
            color: var(--color-red);
            margin-top: 8px;
        }
        
        .dropdown-item.text-red svg {
            color: var(--color-red);
            opacity: 0.8;
        }

        .dropdown-item.text-red:hover {
            background: rgba(255, 51, 51, 0.05);
            border-color: rgba(255, 51, 51, 0.2);
            color: var(--color-red);
            box-shadow: inset 0 0 10px rgba(255, 51, 51, 0.05);
        }
        
        .dropdown-item.text-red:hover svg {
            opacity: 1;
        }

        /* --- Institutional Sidebar --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: rgba(8, 8, 8, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            padding: 3rem 1.5rem;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            margin-bottom: 4rem;
            padding-left: 0.5rem;
        }

        .sidebar-brand span {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: #fff;
            letter-spacing: -1px;
        }

        .nav-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1.2rem;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .nav-link svg {
            opacity: 0.5;
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.05);
        }

        .nav-link.active {
            background: rgba(0, 240, 255, 0.08);
            color: var(--neon-blue);
            border-color: rgba(0, 240, 255, 0.15);
        }

        .nav-link.active svg {
            opacity: 1;
            filter: drop-shadow(0 0 5px var(--neon-blue));
        }

        .sidebar-footer {
            padding-top: 2rem;
            border-top: 1px solid var(--border-glass);
        }

        .btn-logout {
            width: 100%;
            background: transparent;
            color: var(--color-red);
            border: 1px solid rgba(255, 51, 51, 0.15);
            padding: 0.9rem;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 51, 51, 0.05);
            border-color: rgba(255, 51, 51, 0.3);
        }

        /* --- Main Content Layout --- */
        .content-area {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 4rem 5rem;
            height: 100vh;
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
        }

        .header-title h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .header-title p {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            letter-spacing: -0.5px;
        }

        /* --- Dashboard Components --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2.5rem;
            max-width: 1400px;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .card {
            background: rgba(15, 15, 15, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .card-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1.5rem;
            display: block;
            opacity: 0.7;
        }

        .card-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            display: block;
            letter-spacing: -2px;
        }

        .card-meta {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--neon-blue);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            opacity: 0.8;
        }

        /* --- API Access Section --- */
        .api-access-card {
            grid-column: span 3;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .api-key-wrapper {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #api-key-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        .action-group {
            display: flex;
            gap: 0.75rem;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            color: var(--text-muted);
            padding: 0.7rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        /* --- Usage Chart --- */
        .analytics-card {
            padding: 2.5rem;
            min-height: 480px;
            display: flex;
            flex-direction: column;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .section-header h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .usage-chart {
            flex-grow: 1;
            height: 260px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-glass);
        }

        .bar {
            flex: 1;
            background: linear-gradient(180deg, var(--neon-blue), rgba(0, 240, 255, 0.05));
            border-radius: 4px;
            opacity: 0.3;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .bar:hover {
            opacity: 0.9;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        /* --- Audit History --- */
        .audit-panel {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            height: fit-content;
        }

        .audit-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            transition: all 0.3s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .history-meta {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .history-wallet {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .history-time {
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            opacity: 0.7;
        }

        .score-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        .score-badge.low { background: rgba(0, 255, 136, 0.08); color: var(--color-green); border-color: rgba(0, 255, 136, 0.2); }
        .score-badge.medium { background: rgba(255, 184, 0, 0.08); color: var(--color-yellow); border-color: rgba(255, 184, 0, 0.2); }
        .score-badge.high { background: rgba(255, 51, 51, 0.08); color: var(--color-red); border-color: rgba(255, 51, 51, 0.2); }

        .btn-primary {
            background: #fff;
            color: #000;
            border: none;
            padding: 0.9rem 1.8rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.15);
        }

        /* Scrollbar Styling */
        .content-area::-webkit-scrollbar { width: 4px; }
        .content-area::-webkit-scrollbar-track { background: transparent; }
        .content-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* Responsive */
        @media (max-width: 1280px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .summary-cards { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 900px) {
            :root { --sidebar-width: 0px; }
            .sidebar { transform: translateX(-100%); }
            .content-area { margin-left: 0; padding: 2rem; }
            .summary-cards { grid-template-columns: 1fr; }
            .api-access-card { grid-column: span 1; }
            .dashboard-header { display: none !important; }
        }

    </style>
</head>

                    account settings
