<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sentinelpay | dashboard</title>
    
    <meta name="theme-color" content="#0b0e14">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <script src="lib/supabase.js"></script>
    <style>
        .dashboard-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 6rem 1rem 2rem 1rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .user-email {
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .stat-card {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary);
            line-height: 1;
            margin-top: 0.5rem;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .history-item.high { border-left: 3px solid var(--color-red); }
        .history-item.medium { border-left: 3px solid var(--color-yellow); }
        .history-item.low { border-left: 3px solid var(--color-green); }

        .api-key-box {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #000;
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
        }

        .buy-credits-btn {
            background: var(--text);
            color: var(--bg);
        }

        .buy-credits-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--primary);
        }
        
        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .dashboard-container { padding-top: 4rem; }
            .stat-value { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="navbar" style="position: fixed; top: 0; width: 100%; z-index: 100;">
            <div class="logo">
                <a href="/" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
                    <div class="logo-eye">
                        <div class="pupil"></div>
                    </div>
                    <span>sentinelpay</span>
                </a>
            </div>
            <nav style="display: flex; gap: 2rem; align-items: center;">
                <a href="/" class="nav-link">scanner</a>
                <button id="btn-logout" class="btn btn-secondary" style="padding: 0.5rem 1rem;">logout</button>
            </nav>
        </header>

        <main class="dashboard-container">
            <div class="dashboard-header">
                <div>
                    <h1 style="margin: 0; font-size: 2rem;">dashboard</h1>
                    <div id="user-email" class="user-email">loading user...</div>
                </div>
                <button class="btn buy-credits-btn" onclick="alert('stripe integration coming in phase 3')">buy credits</button>
            </div>

            <div class="stats-grid">
                <div class="glass-panel stat-card">
                    <div style="color: var(--text-secondary)">available credits</div>
                    <div id="credit-count" class="stat-value">0</div>
                </div>
                <div class="glass-panel stat-card">
                    <div style="color: var(--text-secondary)">api key</div>
                    <div class="api-key-box" style="margin-top: 1rem;">
                        <span id="api-key-display">••••••••••••••••</span>
                        <button id="btn-reveal-key" class="btn" style="padding: 0.5rem; font-size: 0.75rem;">reveal</button>
                    </div>
                </div>
            </div>

            <h2>scan history</h2>
            <div class="history-list glass-panel" id="history-container" style="padding: 1.5rem;">
                <p style="color: var(--text-secondary); text-align: center; padding: 2rem;">loading history...</p>
            </div>
        </main>
    </div>

    <script src="dashboard-v5.js"></script>
</body>
</html>
