<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sentinelpay | dashboard</title>
    
    <meta name="theme-color" content="#0b0e14">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=17.5">
    <script src="lib/supabase.js"></script>
    <style>
        .dashboard-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 10;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-glass);
        }

        .user-info h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, #fff 0%, #777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-email {
            color: var(--neon-blue);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 160px;
        }

        .stat-label {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            text-transform: lowercase;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 3.5rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            color: #fff;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .api-key-section {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .api-key-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-glass);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-muted);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        #api-key-display {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 250px;
        }

        .history-section h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            text-transform: lowercase;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .history-section h2::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.15);
            transform: translateX(5px);
        }

        .history-item.high { border-left: 3px solid var(--color-red); }
        .history-item.medium { border-left: 3px solid var(--color-yellow); }
        .history-item.low { border-left: 3px solid var(--color-green); }

        .btn-reveal {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-reveal:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .btn-buy {
            background: #fff;
            color: #000;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-buy:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: #fff;
        }

        #btn-logout {
            background: rgba(255, 51, 51, 0.1);
            color: var(--color-red);
            border: 1px solid rgba(255, 51, 51, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        #btn-logout:hover {
            background: var(--color-red);
            color: #fff;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-glass);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo .logo-text {
            font-weight: 800;
            font-size: 1.25rem;
            color: #fff;
            letter-spacing: -0.5px;
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .dashboard-header { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
            .btn-buy { width: 100%; text-align: center; }
            .navbar { padding: 1rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="glow-orb"></div>

    <header class="navbar">
        <a href="/" class="nav-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="width: 32px; height: 32px;">
              <defs>
                <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#00ffff" />
                  <stop offset="100%" stop-color="#a020f0" />
                </linearGradient>
              </defs>
              <g fill="none" stroke="url(#neonGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M60 15 L25 30 V55 C25 80 50 100 60 105 C70 100 95 80 95 55 V30 Z" />
                <circle cx="60" cy="60" r="10" />
              </g>
            </svg>
            <span class="logo-text">sentinelpay</span>
        </a>
        <nav style="display: flex; gap: 1.5rem; align-items: center;">
            <a href="/" class="nav-link">scanner</a>
            <button id="btn-logout">logout</button>
        </nav>
    </header>

    <main class="dashboard-container">
        <section class="dashboard-header">
            <div class="user-info">
                <h1>dashboard</h1>
                <div id="user-email" class="user-email">loading profile_</div>
            </div>
            <a href="#" id="btn-buy-credits" class="btn-buy">buy credits</a>
        </section>

        <section class="stats-grid">
            <div class="glass-panel stat-card">
                <span class="stat-label">> available_credits</span>
                <div id="credit-count" class="stat-value">0</div>
            </div>
            <div class="glass-panel stat-card">
                <span class="stat-label">> active_api_key</span>
                <div class="api-key-section">
                    <div class="api-key-box">
                        <span id="api-key-display">••••••••••••••••</span>
                        <button id="btn-reveal-key" class="btn-reveal">reveal</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="history-section">
            <h2>recent_scans</h2>
            <div class="history-list glass-panel" id="history-container">
                <p style="color: var(--text-muted); text-align: center; padding: 3rem; font-family: 'JetBrains Mono', monospace;">
                    > querying on-chain history...
                </p>
            </div>
        </section>
    </main>

    <script src="toast.js"></script>
    <script src="dashboard-vfinal.js"></script>
</body>
</html>
