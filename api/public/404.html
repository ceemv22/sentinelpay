<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sentinelpay | 404</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="stylesheet" href="style.css?v=23.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            text-align: center;
            padding: 1.5rem;
            position: relative;
            z-index: 10;
            box-sizing: border-box;
        }

        .error-code-wrap {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: clamp(6rem, 18vw, 10rem);
            line-height: 1;
            color: #fff;
            filter: drop-shadow(0 0 30px rgba(0, 240, 255, 0.15));
        }

        .error-logo-eye {
            width: clamp(5rem, 14vw, 8rem);
            height: clamp(5rem, 14vw, 8rem);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-message {
            font-family: 'Inter', sans-serif;
            color: var(--neon-blue);
            font-size: 1rem;
            margin-bottom: 3rem;
            text-transform: lowercase;
            opacity: 0.8;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-transform: lowercase;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
            transform: translateY(-3px);
        }

        @media (max-width: 600px) {
            .error-code-wrap { 
                gap: 0.25rem; 
                font-size: clamp(4.5rem, 25vw, 6rem);
            }
            .error-logo-eye { 
                width: 3.5rem; 
                height: 3.5rem; 
            }
            .error-message {
                font-size: 0.85rem;
                padding: 0 1rem;
            }
            .back-btn {
                width: 80%;
                max-width: 300px;
                padding: 0.8rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <noscript>
        <div class="noscript-overlay" style="display:none">
            <div class="cyber-grid"></div>
            <div class="noscript-card glass-panel">
                <div class="noscript-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--color-red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto;">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12" y2="17"/>
                    </svg>
                </div>
                <h1 class="noscript-title">javascript required</h1>
                <p class="noscript-text">sentinelpay requires javascript to initialize secure sessions.</p>
            </div>
        </div>
    </noscript>
    <div class="cyber-grid"></div>
    <div class="glow-orb"></div>

    <main class="error-container">
        <div class="error-code-wrap">
            <span>4</span>
            <div class="error-logo-eye">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="width: 100%; height: 100%;">
                    <defs>
                        <linearGradient id="neonGradient404" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00ffff" />
                            <stop offset="100%" stop-color="#a020f0" />
                        </linearGradient>
                        <filter id="neonGlow404" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <g filter="url(#neonGlow404)" fill="none" stroke="url(#neonGradient404)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M60 15 L25 30 V55 C25 80 50 100 60 105 C70 100 95 80 95 55 V30 Z" />
                        <path d="M38 60 Q 60 40 82 60 Q 60 80 38 60 Z" />
                        <g class="eye-pupil" style="transition: transform 0.1s ease-out;">
                            <circle cx="60" cy="60" r="6" />
                            <circle cx="60" cy="60" r="2" fill="url(#neonGradient404)" stroke="none"/>
                        </g>
                        <path d="M60 15 V 30" stroke-width="2" opacity="0.6"/>
                        <path d="M60 90 V 105" stroke-width="2" opacity="0.6"/>
                    </g>
                </svg>
            </div>
            <span>4</span>
        </div>

        <p class="error-message">> ERROR_CODE: 404 | RESOURCE_NOT_FOUND_</p>

        <a href="/" class="back-btn">back to scanner</a>
    </main>

    <script src="eye-track.js"></script>
</body>
</html>
