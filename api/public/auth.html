<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sentinelpay | auth</title>
    <meta name="description" content="Login or register for SentinelPay to unlock deep scanning and API access.">
    <meta name="theme-color" content="#050505">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3.2">
    <script src="lib/supabase.js"></script>
</head>
<body>

    <div class="cyber-grid"></div>
    <div class="glow-orb"></div>

    <!-- Fixed Top Bar -->
    <div class="auth-topbar">
        <a href="/" class="auth-nav-btn" style="background: transparent; border-color: rgba(255,255,255,0.06); color: var(--text-muted);">back to scanner</a>
    </div>

    <!-- Centered content -->
    <div class="auth-page-wrap">

        <!-- Logo — exact same SVG and size as homepage (80x80) -->
        <div class="auth-logo-block">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="width: 80px; height: 80px;">
              <defs>
                <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#00ffff" />
                  <stop offset="100%" stop-color="#a020f0" />
                </linearGradient>
                <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
                  <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>
              <g filter="url(#neonGlow)" fill="none" stroke="url(#neonGradient)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M60 15 L25 30 V55 C25 80 50 100 60 105 C70 100 95 80 95 55 V30 Z" />
                <path d="M38 60 Q 60 40 82 60 Q 60 80 38 60 Z" />
                <g id="eye-pupil" style="transition: transform 0.1s ease-out;">
                  <circle cx="60" cy="60" r="6" />
                  <circle cx="60" cy="60" r="2" fill="url(#neonGradient)" stroke="none"/>
                </g>
                <path d="M60 15 V 30" stroke-width="2" opacity="0.6"/>
                <path d="M60 90 V 105" stroke-width="2" opacity="0.6"/>
              </g>
            </svg>
        </div>

        <!-- Auth Card -->
        <div class="auth-card" id="auth-panel">
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login">login</button>
                <button class="auth-tab" id="tab-register">register</button>
            </div>

            <!-- LOGIN PANEL -->
            <div id="panel-login" class="auth-panel-content">
                <div class="auth-social">
                    <button class="social-btn" id="btn-google">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        continue with google
                    </button>
                    <button class="social-btn" id="btn-x">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.005 4.15H5.059z"/>
                        </svg>
                        continue with x
                    </button>
                </div>

                <div class="auth-divider"><span>or via email</span></div>

                <form id="login-form" class="auth-form">
                    <div class="input-group" style="flex-direction: column; gap: 0.4rem;">
                        <label for="login-email">email</label>
                        <input type="email" id="login-email" placeholder="ceo@company.com" required autocomplete="email">
                    </div>
                    <div class="input-group" style="flex-direction: column; gap: 0.4rem; margin-top: 0.75rem;">
                        <label for="login-password">password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <p id="login-error-msg" class="error-msg" style="display: none; margin-top: 0.75rem; font-size: 0.8rem; color: var(--color-red);"></p>
                    <button type="submit" id="login-submit-btn" style="width: 100%; margin-top: 1.5rem; padding: 0.9rem; font-size: 0.95rem;">login</button>
                </form>
            </div>

            <!-- REGISTER PANEL -->
            <div id="panel-register" class="auth-panel-content" style="display: none;">
                <div class="auth-social">
                    <button class="social-btn" id="btn-google-reg">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        continue with google
                    </button>
                    <button class="social-btn" id="btn-x-reg">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.005 4.15H5.059z"/>
                        </svg>
                        continue with x
                    </button>
                </div>

                <div class="auth-divider"><span>or via email</span></div>

                <form id="register-form" class="auth-form">
                    <div class="input-group" style="flex-direction: column; gap: 0.4rem;">
                        <label for="reg-email">email</label>
                        <input type="email" id="reg-email" placeholder="ceo@company.com" required autocomplete="email">
                    </div>
                    <div class="input-group" style="flex-direction: column; gap: 0.4rem; margin-top: 0.75rem;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label for="reg-password" style="margin-bottom: 0;">password</label>
                            <span id="pw-rules-toggle" style="cursor: pointer; color: var(--text-muted); font-size: 0.65rem; font-family: 'JetBrains Mono', monospace; border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s;">?</span>
                        </div>
                        <input type="password" id="reg-password" placeholder="••••••••" required minlength="8" autocomplete="new-password">
                        <div id="pw-rules-tooltip" style="display: none; font-size: 0.7rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; padding: 0.5rem 0.75rem; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.06); border-radius: 6px; margin-top: 0.25rem; line-height: 1.6;">
                            <span id="rule-len" style="color: var(--color-red);">✗</span> min 8 characters<br>
                            <span id="rule-upper" style="color: var(--color-red);">✗</span> one uppercase letter<br>
                            <span id="rule-num" style="color: var(--color-red);">✗</span> one number
                        </div>
                    </div>
                    <div class="input-group" style="flex-direction: column; gap: 0.4rem; margin-top: 0.75rem;">
                        <label for="reg-confirm">confirm password</label>
                        <input type="password" id="reg-confirm" placeholder="••••••••" required autocomplete="new-password">
                    </div>
                    <label style="display: flex; align-items: flex-start; gap: 0.6rem; margin-top: 1.25rem; cursor: pointer; font-size: 0.72rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; line-height: 1.5; letter-spacing: 0;">
                        <input type="checkbox" id="reg-tos" required style="width: auto; flex-shrink: 0; margin-top: 3px; accent-color: var(--neon-blue);">
                        i agree to the <a href="#" style="color: var(--neon-blue); text-decoration: none;">privacy policy</a>&nbsp;and <a href="#" style="color: var(--neon-blue); text-decoration: none;">terms of service</a>
                    </label>
                    <p id="register-error-msg" class="error-msg" style="display: none; margin-top: 0.75rem; font-size: 0.8rem; color: var(--color-red);"></p>
                    <button type="submit" id="register-submit-btn" style="width: 100%; margin-top: 1.25rem; padding: 0.9rem; font-size: 0.95rem;">create account</button>
                </form>
            </div>
        </div>

        <!-- Success State -->
        <div id="auth-success-state" style="display: none; text-align: center; padding: 3rem 0;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-green)" stroke-width="1.5" style="margin: 0 auto 1rem auto; display: block;">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <div style="font-size: 1.2rem; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, #fff 0%, #777 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">account created.</div>
            <p style="color: var(--text-muted); margin-top: 0.75rem; font-size: 0.875rem; font-family: 'JetBrains Mono', monospace;">check your email to verify.</p>
        </div>

    </div>

    <script src="auth.js"></script>
    <script src="eye-track.js"></script>
</body>
</html>
