<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handshake | SentinelPay</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background-color: #050505; color: #ffffff; font-family: 'JetBrains Mono', 'Courier New', monospace; -webkit-font-smoothing: antialiased;">
    <div style="background-color: #050505; padding: 80px 20px; text-align: center;">
        
        <!-- MINIMALIST SHIELD EYE LOGO -->
        <table align="center" border="0" cellpadding="0" cellspacing="0" style="margin-bottom: 60px;">
            <tr>
                <td align="center">
                    <svg width="60" height="60" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                        <!-- Shield -->
                        <path d="M60 15 L25 30 V55 C25 80 50 100 60 105 C70 100 95 80 95 55 V30 Z" fill="none" stroke="#00f0ff" stroke-width="3"/>
                        <!-- Eye Outer -->
                        <path d="M60 45 C45 45 35 60 35 60 C35 60 45 75 60 75 C75 75 85 60 85 60 C85 60 75 45 60 45 Z" fill="none" stroke="#00f0ff" stroke-width="1.5"/>
                        <!-- Pupil -->
                        <circle cx="60" cy="60" r="5" fill="#00f0ff"/>
                        <!-- Glowing Dot (Eye) -->
                        <circle cx="60" cy="60" r="2" fill="#ffffff" style="opacity: 0.8;"/>
                    </svg>
                </td>
            </tr>
        </table>

        <!-- MINIMALIST CONTENT -->
        <table align="center" border="0" cellpadding="0" cellspacing="0" style="max-width: 400px; width: 100%;">
            <tr>
                <td align="center">
                    <div style="font-size: 11px; color: #00f0ff; letter-spacing: 3px; font-weight: 700; margin-bottom: 30px; text-transform: uppercase;">[ verification.required ]</div>
                    
                    <div style="font-size: 18px; line-height: 1.6; color: #ffffff; margin-bottom: 50px; font-weight: 400; text-transform: lowercase; letter-spacing: -0.5px;">
                        handshake initiated. authorize this email to bridge your analyst profile to the sentinelpay engine.
                    </div>

                    <!-- MINIMALIST ACTION BUTTON -->
                    <div style="margin-bottom: 60px;">
                        <a href="{{ .ConfirmationURL }}" style="display: inline-block; background-color: #00f0ff; color: #000000; padding: 18px 40px; text-decoration: none; font-weight: 800; font-size: 13px; text-transform: lowercase; border-radius: 2px;">confirm_signature</a>
                    </div>

                    <!-- TERMINAL STATUS -->
                    <div style="font-size: 10px; color: #222; text-transform: uppercase; letter-spacing: 2px; line-height: 2;">
                        id: 0x{{ .TokenHash }}<br>
                        origin: sentinelpay_v2<br>
                        status: pending_handshake
                    </div>
                </td>
            </tr>
        </table>

        <!-- FOOTER -->
        <div style="margin-top: 100px; font-size: 9px; color: #111; text-transform: uppercase; letter-spacing: 1px;">
            automated cyber-security identity system
        </div>
    </div>
</body>
</html>
